<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EthOS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><defs><linearGradient id='g' x1='0' x2='1' y1='0' y2='1'><stop offset='0' stop-color='%2334d399'/><stop offset='1' stop-color='%230ea5e9'/></linearGradient></defs><rect width='64' height='64' rx='14' fill='%230c0d12'/><circle cx='22' cy='28' r='5' fill='url(%23g)'/><circle cx='42' cy='28' r='5' fill='url(%23g)'/><path d='M20 42 Q32 52 44 42' stroke='url(%23g)' stroke-width='3.5' fill='none' stroke-linecap='round'/></svg>"
    />
    <script>
      // Apply persisted theme as early as possible to avoid a flash.
      (function () {
        try {
          var k = "behaving-agents:theme";
          var s = localStorage.getItem(k);
          if (s !== "light" && s !== "dark") {
            s = window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: light)").matches
              ? "light"
              : "dark";
          }
          document.documentElement.dataset.theme = s;
          document.documentElement.style.colorScheme = s;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
